<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mercury's quests</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div id="app">
    <div id="loginPage">
      <h1>Mercury's quests</h1>
      <input type="email" id="loginEmail" placeholder="Почта">
      <input type="password" id="loginPassword" placeholder="Пароль">
      <button onclick="login()">Войти</button>
      <button onclick="showRegister()">Создать аккаунт</button>
      <div id="loginError" class="error"></div>
    </div>

    <div id="registerPage" style="display:none">
      <h1>Регистрация</h1>
      <input type="email" id="regEmail" placeholder="Почта">
      <input type="text" id="regNick" placeholder="Ник">
      <input type="password" id="regPassword" placeholder="Пароль (мин 8 символов)">
      <button onclick="register()">Зарегистрироваться</button>
      <button onclick="showLogin()">Уже есть аккаунт</button>
      <div id="regError" class="error"></div>
    </div>

    <div id="chatPage" style="display:none">
      <div class="header">
        <span id="chatNick"></span>
        <button onclick="logout()">Выйти</button>
      </div>
      <div id="groupsList"></div>
      <div id="messagesArea"></div>
      <div class="input-area">
        <input type="text" id="msgInput" placeholder="Напиши...">
        <button onclick="sendMessage()">Отправить</button>
      </div>
    </div>
  </div>
  <script src="/script.js"></script>
</body>
</html>
